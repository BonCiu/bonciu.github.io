<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Panel admina - Licencje</title>
  <link rel="stylesheet" href="assets/main.css" />
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #071018 0%, #0a1f2e 100%);
      color: #e8f1ff;
      padding: 24px;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .admin-header {
      background: rgba(8, 18, 35, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.35);
    }

    .admin-header h1 {
      margin: 0;
      font-size: 2.2rem;
    }

    .admin-header p {
      margin: 12px 0 0;
      color: rgba(232,241,255,0.72);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 768px) {
      .admin-grid {
        grid-template-columns: 1fr;
      }
    }

    .admin-card {
      background: rgba(8, 18, 35, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.35);
      display: grid;
      gap: 16px;
    }

    .admin-card h2 {
      margin: 0;
      font-size: 1.3rem;
      color: #d6e4ff;
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .form-group label {
      font-weight: 600;
      color: #d6e4ff;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      height: 45px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 0 14px;
      font-size: 0.95rem;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #57d9fd;
      background: rgba(87,217,253,0.08);
    }

    .admin-button {
      height: 45px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #26c8ff, #02a7ff);
      color: #071018;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .admin-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(38, 200, 255, 0.3);
    }

    .admin-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .admin-button-secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .admin-message {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.9rem;
      display: none;
    }

    .admin-message.show {
      display: block;
    }

    .admin-message.success {
      background: rgba(118, 255, 157, 0.1);
      color: #76ff9d;
      border: 1px solid rgba(118, 255, 157, 0.2);
    }

    .admin-message.error {
      background: rgba(255, 133, 133, 0.1);
      color: #ff8585;
      border: 1px solid rgba(255, 133, 133, 0.2);
    }

    .admin-message.info {
      background: rgba(87, 217, 253, 0.1);
      color: #57d9fd;
      border: 1px solid rgba(87, 217, 253, 0.2);
    }

    .users-list {
      display: grid;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .user-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .user-info {
      display: grid;
      gap: 4px;
    }

    .user-email {
      font-weight: 600;
      color: #e8f1ff;
    }

    .user-status {
      font-size: 0.85rem;
      color: rgba(232,241,255,0.6);
    }

    .user-license {
      font-size: 0.8rem;
      color: #7fdcff;
      font-family: monospace;
    }

    .license-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .license-copy-btn {
      border: 1px solid rgba(87, 217, 253, 0.25);
      background: rgba(87, 217, 253, 0.12);
      color: #57d9fd;
      border-radius: 999px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s ease;
    }

    .license-copy-btn:hover {
      background: rgba(87, 217, 253, 0.2);
    }

    .user-actions {
      display: flex;
      gap: 8px;
    }

    .user-actions button {
      height: 35px;
      padding: 0 12px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    .user-actions button:hover {
      background: rgba(255,255,255,0.12);
    }

    .user-actions button.danger {
      color: #ff8585;
      border: 1px solid rgba(255, 133, 133, 0.2);
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .logs-list {
      display: grid;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .log-item {
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border-left: 3px solid #26c8ff;
      font-size: 0.9rem;
    }

    .log-email {
      font-weight: 600;
      color: #e8f1ff;
    }

    .log-time {
      font-size: 0.8rem;
      color: rgba(232,241,255,0.6);
    }

    .admin-footer {
      text-align: center;
      padding: 20px;
    }

    .admin-footer button {
      height: 40px;
      padding: 0 24px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- HEADER -->
    <div class="admin-header">
      <h1>🔑 Panel zarządzania licencjami</h1>
      <p>Zarządzaj licencjami dla użytkowników aplikacji</p>
    </div>

    <!-- MAIN GRID -->
    <div class="admin-grid">
      <!-- PRZYPISZ LICENCJĘ -->
      <div class="admin-card">
        <h2>📧 Przypisz licencję</h2>
        
        <div id="assign-message" class="admin-message"></div>

        <div class="form-group">
          <label for="user-select">Wybierz użytkownika</label>
          <select id="user-select" required>
            <option value="">-- Załaduj użytkowników --</option>
          </select>
        </div>

        <button id="refresh-users-btn" class="admin-button admin-button-secondary">
          Odśwież użytkowników
        </button>

        <button id="assign-license-btn" class="admin-button">
          Przypisz licencję
        </button>

        <div id="license-code-display" style="display:none; padding: 16px; background: rgba(38, 200, 255, 0.1); border-radius: 12px; border: 1px solid rgba(38, 200, 255, 0.2);">
          <div style="font-size: 0.9rem; color: rgba(232,241,255,0.7); margin-bottom: 8px;">Wygenerowany kod:</div>
          <div class="license-row" style="margin-bottom: 8px;">
            <div id="license-code" style="font-size: 1.1rem; font-weight: 600; color: #26c8ff; font-family: monospace; word-break: break-all;"></div>
            <button id="copy-generated-license-btn" class="license-copy-btn" type="button">📋 Kopiuj</button>
          </div>
          <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 8px;">Email został wysłany na adres użytkownika</div>
        </div>
      </div>

      <!-- LISTA UŻYTKOWNIKÓW -->
      <div class="admin-card">
        <h2 id="users-title">👥 Wszystkie użytkownicy</h2>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <input id="user-search" type="text" placeholder="Szukaj użytkownika..." style="flex:1; min-width:220px; height:42px; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:#fff; padding:0 12px; box-sizing:border-box;" />
          <button id="show-without-license-btn" class="admin-button admin-button-secondary" type="button" style="height:42px; padding:0 14px;">Brak licencji</button>
        </div>
        <div id="users-list" class="users-list">
          <div style="color: rgba(232,241,255,0.5); text-align: center; padding: 20px;">
            Ładowanie...
          </div>
        </div>
      </div>

      <!-- LOGI DOSTĘPU -->
      <div class="admin-card" style="grid-column: 1 / -1;">
        <h2>📊 Logi dostępu (ostatnie 30)</h2>
        <div id="logs-list" class="logs-list">
          <div style="color: rgba(232,241,255,0.5); text-align: center; padding: 20px;">
            Ładowanie...
          </div>
        </div>
      </div>
    </div>

    <div class="admin-footer">
      <button id="logout-btn">Wyloguj</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://joyful-prosperity-production-6a49.up.railway.app/api';
    let adminToken = localStorage.getItem('admin-token');
    let allUsers = [];

    // Redirect if not logged in
    if (!adminToken) {
      window.location.href = 'admin-login.html';
    }

    // Show message
    function showMessage(elementId, message, type = 'info') {
      const messageEl = document.getElementById(elementId);
      messageEl.textContent = message;
      messageEl.className = `admin-message show ${type}`;
    }

    async function copyLicense(text, button) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.setAttribute('readonly', '');
          textarea.style.position = 'fixed';
          textarea.style.left = '-9999px';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
        }

        if (button) {
          const originalText = button.textContent;
          button.textContent = '✓ Skopiowano';
          button.disabled = true;
          setTimeout(() => {
            button.textContent = originalText;
            button.disabled = false;
          }, 1500);
        }
      } catch (error) {
        console.error(error);
        showMessage('assign-message', '❌ Nie udało się skopiować licencji', 'error');
      }
    }

    // Load users
    async function loadUsers() {
      try {
        const response = await fetch(`${API_URL}/admin/users`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });

        if (!response.ok) {
          if (response.status === 401) {
            localStorage.removeItem('admin-token');
            window.location.href = 'admin-login.html';
          }
          throw new Error('Błąd ładowania użytkowników');
        }

        const users = await response.json();
        allUsers = users;

        // Populate select
        const select = document.getElementById('user-select');
        select.innerHTML = '<option value="">-- Wybierz użytkownika --</option>';
        
        users.forEach(user => {
          const option = document.createElement('option');
          option.value = user.email;
          const licenseText = user.license ? ' ✓' : ' (brak licencji)';
          option.textContent = `${user.email}${licenseText}`;
          select.appendChild(option);
        });

        renderUsers(users);
      } catch (error) {
        console.error(error);
        showMessage('assign-message', '❌ ' + error.message, 'error');
      }
    }

    function renderUsers(users) {
      const usersList = document.getElementById('users-list');
      const title = document.getElementById('users-title');
      usersList.innerHTML = '';
      title.textContent = `👥 Wszystkie użytkownicy (${users.length})`;

      if (!users.length) {
        usersList.innerHTML = '<div style="color: rgba(232,241,255,0.5); text-align: center; padding: 20px;">Brak użytkowników</div>';
        return;
      }

      users.forEach(user => {
          const item = document.createElement('div');
          item.className = 'user-item';
          
          const info = document.createElement('div');
          info.className = 'user-info';
          
          const email = document.createElement('div');
          email.className = 'user-email';
          email.textContent = user.email;
          
          const status = document.createElement('div');
          status.className = 'user-status';
          status.textContent = `Dołączył: ${new Date(user.createdAt).toLocaleDateString('pl-PL')}`;
          
          const license = document.createElement('div');
          license.className = 'user-license';
          if (user.license) {
            const licenseRow = document.createElement('div');
            licenseRow.className = 'license-row';
            const licenseText = document.createElement('span');
            licenseText.textContent = `Licencja: ${user.license}`;
            const copyBtn = document.createElement('button');
            copyBtn.className = 'license-copy-btn';
            copyBtn.type = 'button';
            copyBtn.textContent = '📋';
            copyBtn.onclick = () => copyLicense(user.license, copyBtn);
            licenseRow.appendChild(licenseText);
            licenseRow.appendChild(copyBtn);
            license.appendChild(licenseRow);
          } else {
            license.textContent = 'Brak licencji';
            license.style.color = '#ff8585';
          }
          
          info.appendChild(email);
          info.appendChild(status);
          info.appendChild(license);
          
          const actions = document.createElement('div');
          actions.className = 'user-actions';
          
          if (user.license) {
            const deactivateBtn = document.createElement('button');
            deactivateBtn.textContent = '🗑️ Dezaktywuj';
            deactivateBtn.className = 'danger';
            deactivateBtn.onclick = () => deactivateLicense(user.email);
            actions.appendChild(deactivateBtn);
          }
          
          item.appendChild(info);
          item.appendChild(actions);
          usersList.appendChild(item);
        });
    }

    document.getElementById('user-search').addEventListener('input', (event) => {
      const query = event.target.value.toLowerCase().trim();
      const filteredUsers = allUsers.filter(user => user.email.toLowerCase().includes(query));
      renderUsers(filteredUsers);
    });

    document.getElementById('show-without-license-btn').addEventListener('click', () => {
      const withoutLicense = allUsers.filter(user => !user.license);
      renderUsers(withoutLicense);
      document.getElementById('user-search').value = '';
    });

    // Assign license
    document.getElementById('assign-license-btn').addEventListener('click', async () => {
      const email = document.getElementById('user-select').value;

      if (!email) {
        showMessage('assign-message', '❌ Wybierz użytkownika', 'error');
        return;
      }

      const button = document.getElementById('assign-license-btn');
      button.disabled = true;
      button.innerHTML = '<span class="loading"></span>Przypisywanie...';

      try {
        const response = await fetch(`${API_URL}/admin/assign-license`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('assign-message', '✅ ' + data.message, 'success');
          document.getElementById('license-code').textContent = data.licenseCode;
          document.getElementById('license-code-display').style.display = 'block';
          document.getElementById('copy-generated-license-btn').onclick = () => copyLicense(data.licenseCode, document.getElementById('copy-generated-license-btn'));
          document.getElementById('user-select').value = '';
          loadUsers();
        } else {
          showMessage('assign-message', '❌ ' + data.error, 'error');
        }
      } catch (error) {
        showMessage('assign-message', '❌ Błąd: ' + error.message, 'error');
      } finally {
        button.disabled = false;
        button.innerHTML = 'Przypisz licencję';
      }
    });

    // Deactivate license
    async function deactivateLicense(email) {
      if (!confirm(`Dezaktywować licencję dla ${email}?`)) return;

      try {
        const response = await fetch(`${API_URL}/admin/deactivate-license`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (response.ok) {
          showMessage('assign-message', '✅ ' + data.message, 'success');
          loadUsers();
        } else {
          showMessage('assign-message', '❌ ' + data.error, 'error');
        }
      } catch (error) {
        showMessage('assign-message', '❌ Błąd: ' + error.message, 'error');
      }
    }

    // Load access logs
    async function loadLogs() {
      try {
        const response = await fetch(`${API_URL}/admin/access-logs`, {
          headers: { 'Authorization': `Bearer ${adminToken}` }
        });

        if (!response.ok) throw new Error('Błąd ładowania logów');

        const logs = await response.json();
        const logsList = document.getElementById('logs-list');
        logsList.innerHTML = '';

        if (logs.length === 0) {
          logsList.innerHTML = '<div style="color: rgba(232,241,255,0.5); text-align: center; padding: 20px;">Brak logów dostępu</div>';
          return;
        }

        logs.slice(-30).reverse().forEach(log => {
          const item = document.createElement('div');
          item.className = 'log-item';
          
          const date = new Date(log.timestamp);
          const timeStr = date.toLocaleString('pl-PL', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });

          item.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: start; gap: 8px;">
              <div>
                <span class="log-email">${log.email}</span>
                <div class="log-time">${timeStr}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 4px;">IP: ${log.ipAddress || 'unknown'}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 2px;">Lokalizacja: ${log.location || 'unknown'}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 2px;">Urządzenie: ${log.device || 'unknown'} · ${log.browser || 'unknown'}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 2px;">System: ${log.os || 'unknown'} · ${log.language || 'unknown'}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 2px;">Żądanie: ${log.method || 'GET'} ${log.path || ''}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 2px;">Referer: ${log.referrer || 'unknown'}</div>
                <div style="font-size: 0.8rem; color: rgba(232,241,255,0.5); margin-top: 2px;">Origin: ${log.origin || 'unknown'}</div>
              </div>
            </div>
          `;
          
          logsList.appendChild(item);
        });
      } catch (error) {
        console.error(error);
      }
    }

    document.getElementById('copy-generated-license-btn').addEventListener('click', () => {
      const text = document.getElementById('license-code').textContent;
      if (text) {
        copyLicense(text, document.getElementById('copy-generated-license-btn'));
      }
    });

    // Refresh users
    document.getElementById('refresh-users-btn').addEventListener('click', loadUsers);

    // Logout
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('admin-token');
      window.location.href = 'admin-login.html';
    });

    // Initial load
    loadUsers();
    loadLogs();

    // Auto-refresh every 30 seconds
    setInterval(() => {
      loadUsers();
      loadLogs();
    }, 30000);
  </script>
</body>
</html>
