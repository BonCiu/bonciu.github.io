<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Logowanie admina</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #071018 0%, #0a1f2e 100%);
      color: #e8f1ff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .admin-login {
      width: min(420px, 100%);
      background: rgba(8, 18, 35, 0.96);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 30px 100px rgba(0,0,0,0.35);
    }

    .admin-login h1 {
      margin: 0;
      font-size: 1.8rem;
      text-align: center;
    }

    .admin-login p {
      margin: 12px 0 32px;
      text-align: center;
      color: rgba(232,241,255,0.72);
    }

    .form-group {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .form-group label {
      font-weight: 600;
      color: #d6e4ff;
    }

    .form-group input {
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      color: #fff;
      padding: 0 16px;
      font-size: 1rem;
      outline: none;
      box-sizing: border-box;
    }

    .form-group input:focus {
      border-color: #57d9fd;
      background: rgba(87,217,253,0.08);
    }

    .admin-button {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #26c8ff, #02a7ff);
      color: #071018;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 8px;
    }

    .admin-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(38, 200, 255, 0.3);
    }

    .admin-message {
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .admin-message.show {
      display: block;
    }

    .admin-message.success {
      background: rgba(118, 255, 157, 0.1);
      color: #76ff9d;
      border: 1px solid rgba(118, 255, 157, 0.2);
    }

    .admin-message.error {
      background: rgba(255, 133, 133, 0.1);
      color: #ff8585;
      border: 1px solid rgba(255, 133, 133, 0.2);
    }

    .loading {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="admin-login">
    <h1>🔐 Panel admina</h1>
    <p>Logowanie tylko dla administratora</p>

    <form id="admin-form">
      <div id="admin-message" class="admin-message"></div>

      <div class="form-group">
        <label for="admin-password">Hasło administratora</label>
        <input 
          id="admin-password" 
          type="password" 
          placeholder="Wpisz hasło" 
          required 
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="admin-button" id="login-btn">Zaloguj się</button>
    </form>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';

    document.getElementById('admin-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('admin-password').value;
      const button = document.getElementById('login-btn');
      const messageEl = document.getElementById('admin-message');

      button.disabled = true;
      button.innerHTML = '<span class="loading"></span>Weryfikacja...';

      try {
        const response = await fetch(`${API_URL}/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (response.ok) {
          messageEl.textContent = '✅ Zalogowanie pomyślne!';
          messageEl.className = 'admin-message show success';
          
          // Zapis tokenu
          localStorage.setItem('admin-token', data.token);

          // Przekierowanie
          setTimeout(() => {
            window.location.href = 'admin.html';
          }, 1500);
        } else {
          messageEl.textContent = '❌ ' + data.error;
          messageEl.className = 'admin-message show error';
        }
      } catch (error) {
        messageEl.textContent = '❌ Błąd: ' + error.message;
        messageEl.className = 'admin-message show error';
      } finally {
        button.disabled = false;
        button.innerHTML = 'Zaloguj się';
      }
    });
  </script>
</body>
</html>
